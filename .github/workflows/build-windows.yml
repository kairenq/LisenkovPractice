name: Build Windows EXE

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --workspaces --include=dev

      - name: Build shared package
        run: npm run build -w @shared/core

      - name: Lint
        run: npm run lint -w @app/desktop

      - name: Test
        run: npm run test -w @app/desktop

      - name: Build and package exe
        run: npm run package -w @app/desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: material-tracker-win
          path: apps/desktop/release/*

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: apps/desktop/release/*
